name: Build

on:
  push:
    branches: master
  pull_request:
    branches: '*'

jobs:
  build:
    name: Build
    runs-on: ubuntu-latest

    steps:
    - name: Checkout
      uses: actions/checkout@v4

    - name: Base Setup
      uses: jupyterlab/maintainer-tools/.github/actions/base-setup@v1

    - name: Install dependencies
      run: python -m pip install -U "jupyterlab>=4.0.0,<5"

    - name: Install node dependencies
      run: jlpm

    - name: Build and install the extension
      run: |
        set -eux

        # Clean any pre-existing labextension build so hatch-jupyter-builder
        # runs the full build during pip install
        rm -rf jupyterlab_datatable_renderer/labextension

        python -m pip install "."

        jupyter labextension list
        jupyter labextension list 2>&1 | sed 's/\x1b\[[0-9;]*m//g' | grep -ie "jupyterlab-datatable-renderer.*ok"
        python -m jupyterlab.browser_check

    - name: Package the extension
      run: |
        set -eux

        pip install build
        python -m build
        pip uninstall -y "jupyterlab-datatable-renderer" jupyterlab

    - name: upload python build artifacts
      uses: actions/upload-artifact@v4
      with:
        name: dist
        path: dist
        retention-days: 5

    - name: upload typescript build artifacts
      uses: actions/upload-artifact@v4
      with:
        name: lib
        path: lib
        retention-days: 5

    - name: Upload extension packages
      uses: actions/upload-artifact@v4
      with:
        name: extension-artifacts
        path: dist/jupyterlab_datatable_renderer*
        if-no-files-found: error
        retention-days: 5

  test-isolated:
    name: Test isolated
    needs: build
    runs-on: ubuntu-latest

    steps:
    - name: Checkout
      uses: actions/checkout@v4
    - name: Install Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.11'
        architecture: 'x64'
    - uses: actions/download-artifact@v4
      with:
        name: extension-artifacts
    - name: Install and Test
      run: |
        set -eux
        # Remove NodeJS, twice to take care of system and locally installed node versions.
        sudo rm -rf $(which node)
        sudo rm -rf $(which node)

        pip install "jupyterlab>=4.0.0,<5" jupyterlab_datatable_renderer*.whl

        jupyter labextension list
        jupyter labextension list 2>&1 | sed 's/\x1b\[[0-9;]*m//g' | grep -ie "jupyterlab-datatable-renderer.*ok"
        python -m jupyterlab.browser_check --no-chrome-test
